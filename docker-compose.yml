# New-API Docker Compose Configuration (SQLite Only)
# 
# Quick Start:
#   1. docker-compose up -d
#   2. Access at http://localhost:33633
#
# This configuration uses SQLite only (no Redis, no PostgreSQL)

version: '3.4'

services:
  new-api:
    image: new-api:local
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "33633:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=new-api-server
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
